server {
    server_name mail.alexol.io;

    root /var/www/mail/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Лимит 20 МБ для загрузки аватаров и вложений
    client_max_body_size 100M;

    # API proxy - проксируем на Docker backend
    location /api {
        client_max_body_size 100M;
        proxy_pass http://localhost:17000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    # Frontend - отдаем собранную статику (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/console.alexol.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/console.alexol.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = mail.alexol.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name mail.alexol.io;
    return 404; # managed by Certbot
}

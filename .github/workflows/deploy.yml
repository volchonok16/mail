name: Deploy to server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Run docker compose up -d --build
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            # Repo ожидается в /var/www/mail/mail
            # Если его нет — просто клонируем (без удаления директорий, чтобы не ловить Permission denied)
            if [ ! -d /var/www/mail/mail/.git ]; then
              mkdir -p /var/www/mail
              cd /var/www/mail
              if [ ! -d mail ]; then
                git clone https://github.com/volchonok16/mail.git mail
              fi
            fi

            cd /var/www/mail/mail
            git pull
            docker compose up -d --build

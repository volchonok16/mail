name: Deploy to server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Run docker compose up -d --build
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            # Ensure base directory exists
            if [ ! -d /var/www ]; then
              mkdir -p /var/www
            fi

            # Clone repo if it doesn't exist yet
            if [ ! -d /var/www/mail/.git ]; then
              rm -rf /var/www/mail || true
              git clone https://github.com/volchonok16/mail.git /var/www/mail
            fi

            cd /var/www/mail
            git pull
            docker compose up -d --build

name: Deploy to server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload backend (and compose) to server
        uses: Burnett01/rsync-deployments@v8
        with:
          switches: -avz --delete --exclude='.git' --exclude='frontend/node_modules' --exclude='frontend/dist'
          path: .
          remote_path: /home/${{ secrets.SSH_USER }}/mail-deploy
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Upload frontend build to server
        uses: Burnett01/rsync-deployments@v8
        with:
          switches: -avz --delete
          path: frontend/dist/
          remote_path: /home/${{ secrets.SSH_USER }}/mail-html
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Run docker compose up -d --build
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            # Файлы приложения скопированы rsync в домашнюю директорию пользователя
            BACKEND_SRC="$HOME/mail-deploy"
            FRONTEND_SRC="$HOME/mail-html"

            # Перекладываем файлы в /var/www/mail под sudo и запускаем docker compose
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S mkdir -p /var/www/mail /var/www/mail/html

            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S rsync -avz --delete "$BACKEND_SRC"/ /var/www/mail/
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S rsync -avz --delete "$FRONTEND_SRC"/ /var/www/mail/html/

            cd /var/www/mail
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S docker compose up -d --build
